<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
        <link rel="icon" href="images/spirit.svg" type="image/svg+xml">
        <title>Sorceress - MOTU Collection</title>
        <script src="https://code.jquery.com/jquery-3.6.0.slim.min.js" integrity="sha256-u7e5khyithlIdTpu22PHhENmPcRdFiHRjhAuHcs05RI=" crossorigin="anonymous"></script>
        <link href="css/detail.css?1" rel="stylesheet">
        <style type="text/css">
            /* variables */
            :root {
                --figure-primary-color:#B34A00;
                --figure-secondary-color:#FEA201;
                --figure-tertiary-color:#44A1D7;
            }
        </style>
    </head>
    <body>
        <main>
            <section>
                <nav>
                    <a href="index.html">
                        <svg class="close" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 0 384 512"><!--! Font Awesome Free 6.4.2 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license (Commercial License) Copyright 2023 Fonticons, Inc. --><path d="M342.6 150.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192 210.7 86.6 105.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L146.7 256 41.4 361.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192 301.3 297.4 406.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.3 256 342.6 150.6z" /></svg>
                    </a>
                </nav>
                <div class="container">
                    <p class="affiliation">The Heroic Warriors</p>
                    <h1>Sorceress</h1>
                    <p class="lead">Heroic guardian of Castle Grayskull</p>
                    <ul class="collection">
                        <li class="item active animated fadeInUp">
                            <p><span class="brand">Super7</span>MOTUSCLE</p><!-- 2017 -->
                        </li>
                        <li class="item animated fadeInUp" style="animation-delay: .1s;">
                            <p><span class="brand">Funko</span>POP!</p><!-- 2020 -->
                            <p class="pop">993</p>
                        </li>
                        <li class="item animated fadeInUp" style="animation-delay: .2s;">
                            <p><span class="brand">Mega</span>Construx</p><!-- 2020 -->
                        </li>
                        <li class="item animated fadeInUp" style="animation-delay: .3s;">
                            <p><span class="brand">Mattel</span>Origins</p><!-- 2022 -->
                        </li>
                        <p class="also animated fadeInUp" style="animation-delay: 1.3s;"><span class="brand">You may also like:</span> <a href="#">Temple of Darkness Sorceress</a></p>
                    </ul>
                </div>
            </section>
            <aside>
                <ul class="tabs-content">
                    <li class="small">
                        <img
                            src="images/sorceress/motuscle.avif"
                            class="img-responsive"
                            alt="Super 7 MOTUSCLE Sorceress figure" />
                    </li>
                    <li class="medium">
                        <img
                            src="images/sorceress/funko-pop.avif"
                            class="img-responsive"
                            alt="Funko POP Sorceress figure" />
                    </li>
                    <li class="small">
                        <img
                            src="images/sorceress/mega.avif"
                            class="img-responsive"
                            alt="Mega Construx Sorceress figure" />
                    </li>
                    <li class="medium">
                        <img
                            src="images/sorceress/origins.avif"
                            class="img-responsive"
                            alt="Mattel Origins Sorceress figure" />
                    </li>
                </ul>
            </aside>
        </main>
        <script src="js/images.js"></script>
    </body>
</html>
